<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>キーボードピアノ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Helvetica Neue', sans-serif;
    color: #eee;
    user-select: none;
  }

  h1 {
    margin-bottom: 12px;
    font-size: 1.4rem;
    letter-spacing: 0.1em;
    color: #a0c4ff;
  }

  .legend {
    margin-bottom: 28px;
    font-size: 0.78rem;
    color: #888;
    text-align: center;
    line-height: 1.8;
  }
  .legend span { color: #a0c4ff; }

  /* ピアノ外枠 */
  .piano-wrap {
    background: #111;
    border-radius: 12px;
    padding: 24px 20px 28px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.7);
  }

  .piano {
    position: relative;
    display: flex;
    height: 200px;
  }

  /* 白鍵 */
  .key {
    position: relative;
    width: 52px;
    height: 200px;
    background: #f5f0e8;
    border: 1px solid #999;
    border-radius: 0 0 8px 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 10px;
    font-size: 11px;
    color: #666;
    font-weight: bold;
    transition: background 0.04s;
    z-index: 1;
  }
  .key:first-child { border-radius: 0 0 8px 8px; }

  .key .note-name {
    font-size: 9px;
    color: #bbb;
    margin-bottom: 2px;
  }
  .key .key-label {
    font-size: 13px;
    font-weight: 700;
    color: #777;
  }

  .key.active {
    background: #a0c4ff;
  }

  /* 黒鍵 */
  .key.black {
    position: absolute;
    width: 34px;
    height: 124px;
    background: #222;
    border: 1px solid #000;
    border-radius: 0 0 6px 6px;
    z-index: 2;
    color: #aaa;
    font-size: 10px;
    padding-bottom: 8px;
  }
  .key.black .note-name { color: #888; }
  .key.black .key-label { color: #aaa; font-size: 11px; }
  .key.black.active {
    background: #5b8fff;
  }

  .sustain-row {
    margin-top: 22px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.82rem;
    color: #888;
  }
  .sustain-btn {
    padding: 5px 18px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #222;
    color: #aaa;
    cursor: pointer;
    font-size: 0.82rem;
    transition: background 0.1s;
  }
  .sustain-btn.on {
    background: #a0c4ff22;
    border-color: #a0c4ff;
    color: #a0c4ff;
  }

  .octave-row {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.82rem;
    color: #888;
  }
  .octave-btn {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid #444;
    background: #222;
    color: #aaa;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
  }
  .octave-btn:hover { background: #333; }
  #octave-display {
    min-width: 60px;
    text-align: center;
    color: #a0c4ff;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<h1>キーボードピアノ</h1>
<div class="legend">
  白鍵: <span>A S D F G H J K L ;</span> &nbsp;|&nbsp; 黒鍵: <span>W E &nbsp;T Y U &nbsp;O P</span><br>
  オクターブ: <span>← →</span> キー &nbsp;|&nbsp; サスティン: <span>Space</span>
</div>

<div class="piano-wrap">
  <div class="piano" id="piano"></div>

  <div class="sustain-row">
    <span>サスティン (Space)</span>
    <button class="sustain-btn" id="sustain-btn">OFF</button>
  </div>

  <div class="octave-row">
    <span>オクターブ</span>
    <button class="octave-btn" id="oct-down">◀</button>
    <span id="octave-display">オクターブ 4</span>
    <button class="octave-btn" id="oct-up">▶</button>
  </div>
</div>

<script>
// ---- 音源 (Web Audio API) ----
const ctx = new (window.AudioContext || window.webkitAudioContext)();

// ノート番号→周波数
function midiToFreq(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

// アクティブなオシレータ管理
const activeNodes = {};
let sustainOn = false;
const sustainedKeys = new Set();

function playNote(midi) {
  if (activeNodes[midi]) return;
  const freq = midiToFreq(midi);
  const osc = ctx.createOscillator();
  const gainNode = ctx.createGain();

  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq, ctx.currentTime);

  // 倍音を少し加えてピアノっぽく
  const osc2 = ctx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(freq * 2, ctx.currentTime);
  const gain2 = ctx.createGain();
  gain2.gain.setValueAtTime(0.15, ctx.currentTime);

  gainNode.gain.setValueAtTime(0, ctx.currentTime);
  gainNode.gain.linearRampToValueAtTime(0.35, ctx.currentTime + 0.01);
  // ピアノ的アタック後のデケイ
  gainNode.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.3);

  osc.connect(gainNode);
  osc2.connect(gain2);
  gain2.connect(gainNode);
  gainNode.connect(ctx.destination);

  osc.start();
  osc2.start();

  activeNodes[midi] = { osc, osc2, gainNode, gain2 };
}

function releaseNote(midi) {
  if (sustainOn) {
    sustainedKeys.add(midi);
    return;
  }
  stopNote(midi);
}

function stopNote(midi) {
  const n = activeNodes[midi];
  if (!n) return;
  const now = ctx.currentTime;
  n.gainNode.gain.cancelScheduledValues(now);
  n.gainNode.gain.setValueAtTime(n.gainNode.gain.value, now);
  n.gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
  n.osc.stop(now + 0.4);
  n.osc2.stop(now + 0.4);
  delete activeNodes[midi];
  sustainedKeys.delete(midi);
}

function releaseAllSustained() {
  for (const midi of [...sustainedKeys]) stopNote(midi);
}

// ---- キー定義 ----
// 白鍵: C D E F G A B C D E  (1オクターブ+2)
// インデックス 0..9 → オフセット 0,2,4,5,7,9,11,12,14,16
const WHITE_OFFSETS = [0, 2, 4, 5, 7, 9, 11, 12, 14, 16];
const WHITE_NAMES   = ['C','D','E','F','G','A','B','C','D','E'];
const WHITE_KEYS    = ['a','s','d','f','g','h','j','k','l',';'];

// 黒鍵: C# D# _ F# G# A# _ C# D#
// 白鍵の左端から: 白鍵0と1の間=C#, 1と2=D#, (2と3の間なし=E#ない), 3と4=F#, 4と5=G#, 5と6=A#, (6と7なし), 7と8=C#, 8と9=D#
const BLACK_DEFS = [
  { afterWhite: 0, offset: 1,  name: 'C#', keyChar: 'w' },
  { afterWhite: 1, offset: 3,  name: 'D#', keyChar: 'e' },
  { afterWhite: 3, offset: 6,  name: 'F#', keyChar: 't' },
  { afterWhite: 4, offset: 8,  name: 'G#', keyChar: 'y' },
  { afterWhite: 5, offset: 10, name: 'A#', keyChar: 'u' },
  { afterWhite: 7, offset: 13, name: 'C#', keyChar: 'o' },
  { afterWhite: 8, offset: 15, name: 'D#', keyChar: 'p' },
];

let baseOctave = 4;  // C4 = MIDI 60

function getBaseMidi() {
  return (baseOctave) * 12 + 12; // C4 = 60
}

// ---- DOM構築 ----
const pianoEl = document.getElementById('piano');
const WHITE_WIDTH = 52;

function buildPiano() {
  pianoEl.innerHTML = '';
  const baseMidi = getBaseMidi();

  // 白鍵
  WHITE_KEYS.forEach((k, i) => {
    const midi = baseMidi + WHITE_OFFSETS[i];
    const div = document.createElement('div');
    div.className = 'key';
    div.dataset.midi = midi;
    div.dataset.keychar = k;
    div.innerHTML = `<span class="note-name">${WHITE_NAMES[i]}</span><span class="key-label">${k.toUpperCase()}</span>`;
    div.addEventListener('mousedown', e => { e.preventDefault(); ctx.resume(); playNote(midi); div.classList.add('active'); });
    div.addEventListener('mouseup', () => { releaseNote(midi); div.classList.remove('active'); });
    div.addEventListener('mouseleave', () => { if(activeNodes[midi]) { releaseNote(midi); div.classList.remove('active'); } });
    pianoEl.appendChild(div);
  });

  // 黒鍵 (position absolute)
  BLACK_DEFS.forEach(def => {
    const midi = baseMidi + def.offset;
    const div = document.createElement('div');
    div.className = 'key black';
    div.dataset.midi = midi;
    div.dataset.keychar = def.keyChar;
    // 位置: afterWhite番目の白鍵の右端 - 黒鍵幅/2
    const left = (def.afterWhite + 1) * WHITE_WIDTH - 17;
    div.style.left = left + 'px';
    div.innerHTML = `<span class="note-name">${def.name}</span><span class="key-label">${def.keyChar.toUpperCase()}</span>`;
    div.addEventListener('mousedown', e => { e.preventDefault(); ctx.resume(); playNote(midi); div.classList.add('active'); });
    div.addEventListener('mouseup', () => { releaseNote(midi); div.classList.remove('active'); });
    div.addEventListener('mouseleave', () => { if(activeNodes[midi]) { releaseNote(midi); div.classList.remove('active'); } });
    pianoEl.appendChild(div);
  });
}

buildPiano();

// ---- キーボード操作 ----
// keyChar → MIDI のマップを動的生成
function buildKeyMap() {
  const map = {};
  const baseMidi = getBaseMidi();
  WHITE_KEYS.forEach((k, i) => { map[k] = baseMidi + WHITE_OFFSETS[i]; });
  BLACK_DEFS.forEach(def => { map[def.keyChar] = baseMidi + def.offset; });
  return map;
}

const pressedKeys = new Set();

document.addEventListener('keydown', e => {
  if (e.repeat) return;
  ctx.resume();

  const key = e.key.toLowerCase();

  // オクターブ変更
  if (e.key === 'ArrowLeft') { changeOctave(-1); return; }
  if (e.key === 'ArrowRight') { changeOctave(1); return; }

  // サスティン
  if (e.key === ' ') {
    e.preventDefault();
    setSustain(true);
    return;
  }

  const map = buildKeyMap();
  if (map[key] !== undefined && !pressedKeys.has(key)) {
    pressedKeys.add(key);
    const midi = map[key];
    playNote(midi);
    highlightKey(midi, true);
  }
});

document.addEventListener('keyup', e => {
  const key = e.key.toLowerCase();

  if (e.key === ' ') {
    setSustain(false);
    return;
  }

  const map = buildKeyMap();
  if (map[key] !== undefined) {
    pressedKeys.delete(key);
    const midi = map[key];
    releaseNote(midi);
    highlightKey(midi, false);
  }
});

function highlightKey(midi, on) {
  const el = pianoEl.querySelector(`[data-midi="${midi}"]`);
  if (el) el.classList.toggle('active', on);
}

// ---- サスティン ----
const sustainBtn = document.getElementById('sustain-btn');
function setSustain(on) {
  sustainOn = on;
  sustainBtn.textContent = on ? 'ON' : 'OFF';
  sustainBtn.classList.toggle('on', on);
  if (!on) releaseAllSustained();
}
sustainBtn.addEventListener('click', () => setSustain(!sustainOn));

// ---- オクターブ ----
function changeOctave(delta) {
  baseOctave = Math.max(1, Math.min(7, baseOctave + delta));
  document.getElementById('octave-display').textContent = `オクターブ ${baseOctave}`;
  // 鳴っている音を止める
  Object.keys(activeNodes).forEach(m => stopNote(Number(m)));
  pressedKeys.clear();
  buildPiano();
}
document.getElementById('oct-down').addEventListener('click', () => changeOctave(-1));
document.getElementById('oct-up').addEventListener('click', () => changeOctave(1));
</script>
</body>
</html>
