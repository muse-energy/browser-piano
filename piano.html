<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キーボードピアノ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Helvetica Neue', sans-serif;
    color: #eee;
    user-select: none;
    -webkit-user-select: none;
    padding: 20px 12px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  h1 {
    margin-bottom: 10px;
    font-size: 1.4rem;
    letter-spacing: 0.1em;
    color: #a0c4ff;
  }

  .legend {
    margin-bottom: 20px;
    font-size: 0.78rem;
    color: #888;
    text-align: center;
    line-height: 1.8;
  }
  .legend span { color: #a0c4ff; }

  .touch-hint { display: none; }
  @media (hover: none) and (pointer: coarse) {
    .kb-hint { display: none; }
    .touch-hint { display: inline; }
  }

  .piano-wrap {
    width: min(560px, 96vw);
    background: #111;
    border-radius: 12px;
    padding: 20px 16px 24px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.7);
  }

  .piano {
    position: relative;
    display: flex;
    touch-action: none;
  }

  /* 白鍵 */
  .key {
    position: relative;
    width: var(--ww, 52px);
    height: var(--kh, 200px);
    background: #f5f0e8;
    border: 1px solid #999;
    border-radius: 0 0 8px 8px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 8px;
    color: #666;
    font-weight: bold;
    transition: background 0.04s;
    z-index: 1;
  }

  .key .note-name {
    font-size: var(--font-note, 9px);
    color: #bbb;
    margin-bottom: 2px;
  }
  .key .key-label {
    font-size: var(--font-key, 13px);
    font-weight: 700;
    color: #777;
  }

  .key.active { background: #a0c4ff; }

  /* 黒鍵 */
  .key.black {
    position: absolute;
    width: var(--bw, 34px);
    height: var(--bh, 124px);
    background: #222;
    border: 1px solid #000;
    border-radius: 0 0 6px 6px;
    z-index: 2;
    color: #aaa;
    padding-bottom: 6px;
  }
  .key.black .note-name { color: #888; }
  .key.black .key-label { color: #aaa; }
  .key.black.active { background: #5b8fff; }

  /* タッチ端末ではキーボードラベル非表示 */
  @media (hover: none) and (pointer: coarse) {
    .key .key-label { display: none; }
  }

  .controls {
    margin-top: 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .sustain-row, .octave-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.82rem;
    color: #888;
  }

  .sustain-btn {
    padding: 8px 20px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #222;
    color: #aaa;
    cursor: pointer;
    font-size: 0.82rem;
    transition: background 0.1s;
    min-width: 60px;
    touch-action: manipulation;
  }
  .sustain-btn.on {
    background: #a0c4ff22;
    border-color: #a0c4ff;
    color: #a0c4ff;
  }

  .octave-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #222;
    color: #aaa;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
  }
  .octave-btn:active { background: #333; }

  #octave-display {
    min-width: 60px;
    text-align: center;
    color: #a0c4ff;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<h1>キーボードピアノ</h1>
<div class="legend">
  <span class="kb-hint">白鍵: <span>A S D F G H J K L ;</span> &nbsp;|&nbsp; 黒鍵: <span>W E &nbsp;T Y U &nbsp;O P</span><br>
  オクターブ: <span>← →</span> キー &nbsp;|&nbsp; サスティン: <span>Space</span></span>
  <span class="touch-hint">タッチで演奏 &nbsp;|&nbsp; 複数の指でコード演奏も可能</span>
</div>

<div class="piano-wrap">
  <div class="piano" id="piano"></div>

  <div class="controls">
    <div class="sustain-row">
      <span>サスティン</span>
      <button class="sustain-btn" id="sustain-btn">OFF</button>
    </div>
    <div class="octave-row">
      <span>オクターブ</span>
      <button class="octave-btn" id="oct-down">◀</button>
      <span id="octave-display">オクターブ 4</span>
      <button class="octave-btn" id="oct-up">▶</button>
    </div>
  </div>
</div>

<script>
// ---- 音源 (Web Audio API) ----
const ctx = new (window.AudioContext || window.webkitAudioContext)();

function midiToFreq(midi) {
  return 440 * Math.pow(2, (midi - 69) / 12);
}

const activeNodes = {};
let sustainOn = false;
const sustainedKeys = new Set();

function playNote(midi) {
  if (activeNodes[midi]) return;
  const freq = midiToFreq(midi);
  const osc = ctx.createOscillator();
  const gainNode = ctx.createGain();

  osc.type = 'triangle';
  osc.frequency.setValueAtTime(freq, ctx.currentTime);

  const osc2 = ctx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(freq * 2, ctx.currentTime);
  const gain2 = ctx.createGain();
  gain2.gain.setValueAtTime(0.15, ctx.currentTime);

  gainNode.gain.setValueAtTime(0, ctx.currentTime);
  gainNode.gain.linearRampToValueAtTime(0.35, ctx.currentTime + 0.01);
  gainNode.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.3);

  osc.connect(gainNode);
  osc2.connect(gain2);
  gain2.connect(gainNode);
  gainNode.connect(ctx.destination);
  osc.start();
  osc2.start();

  activeNodes[midi] = { osc, osc2, gainNode, gain2 };
}

function releaseNote(midi) {
  if (sustainOn) { sustainedKeys.add(midi); return; }
  stopNote(midi);
}

function stopNote(midi) {
  const n = activeNodes[midi];
  if (!n) return;
  const now = ctx.currentTime;
  n.gainNode.gain.cancelScheduledValues(now);
  n.gainNode.gain.setValueAtTime(n.gainNode.gain.value, now);
  n.gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
  n.osc.stop(now + 0.4);
  n.osc2.stop(now + 0.4);
  delete activeNodes[midi];
  sustainedKeys.delete(midi);
}

function releaseAllSustained() {
  for (const midi of [...sustainedKeys]) stopNote(midi);
}

// ---- キー定義 ----
const WHITE_OFFSETS = [0, 2, 4, 5, 7, 9, 11, 12, 14, 16];
const WHITE_NAMES   = ['C','D','E','F','G','A','B','C','D','E'];
const WHITE_KEYS    = ['a','s','d','f','g','h','j','k','l',';'];

const BLACK_DEFS = [
  { afterWhite: 0, offset: 1,  name: 'C#', keyChar: 'w' },
  { afterWhite: 1, offset: 3,  name: 'D#', keyChar: 'e' },
  { afterWhite: 3, offset: 6,  name: 'F#', keyChar: 't' },
  { afterWhite: 4, offset: 8,  name: 'G#', keyChar: 'y' },
  { afterWhite: 5, offset: 10, name: 'A#', keyChar: 'u' },
  { afterWhite: 7, offset: 13, name: 'C#', keyChar: 'o' },
  { afterWhite: 8, offset: 15, name: 'D#', keyChar: 'p' },
];

let baseOctave = 4;
function getBaseMidi() { return baseOctave * 12 + 12; }

// ---- レスポンシブサイズ計算 ----
const pianoEl = document.getElementById('piano');
let WHITE_WIDTH = 52;

function calcKeySize() {
  const wrap = pianoEl.parentElement;
  const availW = wrap.clientWidth - 32; // padding 16px × 2
  WHITE_WIDTH = Math.max(28, Math.floor(availW / 10));
  const kh = Math.round(WHITE_WIDTH * 3.6);
  const bw = Math.round(WHITE_WIDTH * 0.62);
  const bh = Math.round(kh * 0.62);
  const fontNote = Math.max(7, Math.round(WHITE_WIDTH * 0.18));
  const fontKey  = Math.max(9, Math.round(WHITE_WIDTH * 0.24));
  pianoEl.style.setProperty('--ww',        WHITE_WIDTH + 'px');
  pianoEl.style.setProperty('--kh',        kh + 'px');
  pianoEl.style.setProperty('--bw',        bw + 'px');
  pianoEl.style.setProperty('--bh',        bh + 'px');
  pianoEl.style.setProperty('--font-note', fontNote + 'px');
  pianoEl.style.setProperty('--font-key',  fontKey + 'px');
  pianoEl.style.height = kh + 'px';
  return { bw };
}

// ---- DOM構築 ----
function buildPiano() {
  const { bw } = calcKeySize();
  pianoEl.innerHTML = '';
  const baseMidi = getBaseMidi();

  WHITE_KEYS.forEach((k, i) => {
    const midi = baseMidi + WHITE_OFFSETS[i];
    const div = document.createElement('div');
    div.className = 'key';
    div.dataset.midi = midi;
    div.innerHTML = `<span class="note-name">${WHITE_NAMES[i]}</span><span class="key-label">${k.toUpperCase()}</span>`;
    pianoEl.appendChild(div);
  });

  BLACK_DEFS.forEach(def => {
    const midi = baseMidi + def.offset;
    const div = document.createElement('div');
    div.className = 'key black';
    div.dataset.midi = midi;
    const left = (def.afterWhite + 1) * WHITE_WIDTH - Math.floor(bw / 2);
    div.style.left = left + 'px';
    div.style.top = '0';
    div.innerHTML = `<span class="note-name">${def.name}</span><span class="key-label">${def.keyChar.toUpperCase()}</span>`;
    pianoEl.appendChild(div);
  });
}

buildPiano();

// ---- ポインターイベント (タッチ・マウス共通) ----
const activePointers = new Map(); // pointerId → midi

function getMidiAtPoint(x, y) {
  const el = document.elementFromPoint(x, y);
  const key = el?.closest('[data-midi]');
  return key ? Number(key.dataset.midi) : undefined;
}

pianoEl.addEventListener('pointerdown', e => {
  e.preventDefault();
  ctx.resume();
  const midi = getMidiAtPoint(e.clientX, e.clientY);
  if (midi !== undefined) {
    activePointers.set(e.pointerId, midi);
    playNote(midi);
    highlightKey(midi, true);
  }
}, { passive: false });

pianoEl.addEventListener('pointermove', e => {
  if (!activePointers.has(e.pointerId)) return;
  const newMidi = getMidiAtPoint(e.clientX, e.clientY);
  const oldMidi = activePointers.get(e.pointerId);
  if (newMidi !== undefined && newMidi !== oldMidi) {
    releaseNote(oldMidi);
    highlightKey(oldMidi, false);
    playNote(newMidi);
    highlightKey(newMidi, true);
    activePointers.set(e.pointerId, newMidi);
  }
});

function endPointer(e) {
  const midi = activePointers.get(e.pointerId);
  if (midi !== undefined) {
    releaseNote(midi);
    highlightKey(midi, false);
    activePointers.delete(e.pointerId);
  }
}
pianoEl.addEventListener('pointerup', endPointer);
pianoEl.addEventListener('pointercancel', endPointer);
pianoEl.addEventListener('pointerleave', endPointer);

// ピアノ外でマウスボタンを離した場合の保険
document.addEventListener('pointerup', e => {
  if (activePointers.has(e.pointerId)) endPointer(e);
});

function highlightKey(midi, on) {
  const el = pianoEl.querySelector(`[data-midi="${midi}"]`);
  if (el) el.classList.toggle('active', on);
}

// ---- キーボード操作 ----
function buildKeyMap() {
  const map = {};
  const baseMidi = getBaseMidi();
  WHITE_KEYS.forEach((k, i) => { map[k] = baseMidi + WHITE_OFFSETS[i]; });
  BLACK_DEFS.forEach(def => { map[def.keyChar] = baseMidi + def.offset; });
  return map;
}

const pressedKeys = new Set();

document.addEventListener('keydown', e => {
  if (e.repeat) return;
  ctx.resume();
  if (e.key === 'ArrowLeft')  { changeOctave(-1); return; }
  if (e.key === 'ArrowRight') { changeOctave(1);  return; }
  if (e.key === ' ') { e.preventDefault(); setSustain(true); return; }
  const key = e.key.toLowerCase();
  const map = buildKeyMap();
  if (map[key] !== undefined && !pressedKeys.has(key)) {
    pressedKeys.add(key);
    playNote(map[key]);
    highlightKey(map[key], true);
  }
});

document.addEventListener('keyup', e => {
  if (e.key === ' ') { setSustain(false); return; }
  const key = e.key.toLowerCase();
  const map = buildKeyMap();
  if (map[key] !== undefined) {
    pressedKeys.delete(key);
    releaseNote(map[key]);
    highlightKey(map[key], false);
  }
});

// ---- サスティン ----
const sustainBtn = document.getElementById('sustain-btn');
function setSustain(on) {
  sustainOn = on;
  sustainBtn.textContent = on ? 'ON' : 'OFF';
  sustainBtn.classList.toggle('on', on);
  if (!on) releaseAllSustained();
}
sustainBtn.addEventListener('click', () => setSustain(!sustainOn));

// ---- オクターブ ----
function changeOctave(delta) {
  baseOctave = Math.max(1, Math.min(7, baseOctave + delta));
  document.getElementById('octave-display').textContent = `オクターブ ${baseOctave}`;
  Object.keys(activeNodes).forEach(m => stopNote(Number(m)));
  pressedKeys.clear();
  activePointers.clear();
  buildPiano();
}
document.getElementById('oct-down').addEventListener('click', () => changeOctave(-1));
document.getElementById('oct-up').addEventListener('click', () => changeOctave(1));

// ---- フォーカス喪失時に全音停止 ----
function stopAll() {
  Object.keys(activeNodes).forEach(m => stopNote(Number(m)));
  pianoEl.querySelectorAll('.key.active').forEach(el => el.classList.remove('active'));
  pressedKeys.clear();
  activePointers.clear();
  setSustain(false);
}
document.addEventListener('visibilitychange', () => { if (document.hidden) stopAll(); });
window.addEventListener('blur', stopAll);

// ---- リサイズ対応 ----
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    Object.keys(activeNodes).forEach(m => stopNote(Number(m)));
    activePointers.clear();
    pressedKeys.clear();
    buildPiano();
  }, 150);
});
</script>
</body>
</html>
